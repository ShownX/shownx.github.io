    Experience:
      - company: AWS AI Labs
        position: Tech Lead, Senior Applied Scientist
        location: New York, NY
        start_date: 2019
        end_date: Present
        summary: Lead research and production work across agentic systems, alignment & safety, post-training, and lifelong learning for foundation models.
        highlights:
          - "Agentic AI — Self-evolving multi-agent system (Triage, Red Team, Model Patch & Handoff) compresses launch cadence by ~75%; multi-agent harness runs 200+ autonomous experiments per sprint at ~6× lower cost; Co-Scientist agent compresses literature surveys from 1–2 weeks to 1–2 days."
          - "Alignment & Safety — Super-alignment pipeline (multi-modal red-teaming, distributed LLM-as-judge eval, adversarial post-training) reduces attack success rate by an order of magnitude across text and vision while preserving task quality."
          - "Digital Identity Defense — Led Amazon Rekognition identity verification against presentation attacks, deepfakes, and injection attacks at billion-level annual checks; shipped multiple model updates per year."
          - "Privacy — GPU-accelerated Fully Homomorphic Encryption (CKKS, BFV) with ~45× speedup at zero accuracy loss for regulated markets."
          - "Continual Learning & Distillation — VLM/LLM frameworks that detect task overlap, consolidate experts via on-policy self-distillation, and route via zero-parameter or GMM routers; +7–15 points over strongest baselines, up to 3× fewer adapters."
          - "Hybrid VLM Architecture — Replaced 25% of attention layers with linear-time recurrent layers (GKA); near-parity on VL benchmarks with 1.3–1.5× inference speedup at long contexts."
          - "Hardware-Aware Distillation — Training methods for LLMs on analog in-memory computing; staged curriculum stays within 2.5 points under hardware non-idealities; reverse-linear noise schedule matches clean training within 0.003."

