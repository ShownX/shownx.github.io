    Tech lead and senior applied scientist with 7+ years of industry experience and 15+ years of research experience in
    multimodal AI, agentic systems, and alignment. I work on co-designing lifelong learning and adversarial post-training
    so foundation models keep improving themselves while staying aligned in production.
    Published at CVPR, ICCV, ECCV, and NeurIPS with 1,600+ citations and h-index 10.

